<form class="form" id="contact-form" action="https://platform.boostagency.uz/api/leads" method="post" novalidate>
  <div class="form__row">
    <div class="form__field">
      <label for="f-first">First name</label>
      <input id="f-first" name="first_name" type="text" placeholder="First name" required>
    </div>
    <div class="form__field">
      <label for="f-last">Last name</label>
      <input id="f-last" name="last_name" type="text" placeholder="Last name" required>
    </div>
  </div>
  <div class="form__field">
    <label for="f-email">Work email</label>
    <input id="f-email" name="email" type="email" placeholder="client@company.com" required>
  </div>
  <div class="form__row">
    <div class="form__field">
      <label for="f-company">Company</label>
      <input id="f-company" name="company" type="text" placeholder="Company name" required>
    </div>
    <div class="form__field">
      <label for="f-role">Role</label>
      <input id="f-role" name="role" type="text" placeholder="Head of Marketing">
    </div>
  </div>
  <div class="form__row">
    <div class="form__field">
      <label for="f-phone">Phone</label>
      <input id="f-phone" name="phone" type="tel" placeholder="+998 90 123 45 67" pattern="[\+\d\s\-\(\)]{7,20}" title="Phone number with country code — e.g. +998 90 123 45 67">
    </div>
    <div class="form__field">
      <label for="f-site">Website</label>
      <input id="f-site" name="website" type="url" placeholder="https://company.com">
    </div>
  </div>
  <div class="form__field">
    <label for="f-budget">Monthly budget</label>
    <select id="f-budget" name="budget" required>
      <option value="" disabled selected hidden>Select a range</option>
      <option>up to $5,000</option>
      <option>$5,000 – $20,000</option>
      <option>$20,000 – $50,000</option>
      <option>from $50,000</option>
      <option>Not sure yet</option>
    </select>
  </div>
  <div class="form__field">
    <label for="f-msg">What would you like to discuss?</label>
    <textarea id="f-msg" name="message" rows="4" placeholder="Briefly about your product, KPIs and current situation"></textarea>
  </div>
  <div class="form__honeypot" aria-hidden="true">
    <label for="f-hp-url">Don't fill this field</label>
    <input id="f-hp-url" name="website_url" type="text" tabindex="-1" autocomplete="off">
  </div>
  <label class="form__checkbox">
    <input type="checkbox" name="consent" required>
    <span>I consent to the processing of my personal data in accordance with the <a href="privacy/">Privacy Policy</a>.</span>
  </label>
  <div class="form__error" id="form-error" role="alert" aria-live="polite" hidden>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span class="form__error-text">Could not send the request. Please try again or reach us at <a href="mailto:andrevdanil@gmail.com">andrevdanil@gmail.com</a>.</span>
  </div>
  <button type="submit" class="btn btn--primary btn--large form__submit">Send request</button>
</form>

<div class="form__success" id="form-success" role="status" aria-live="polite">
  <div class="form__success-icon">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <h3>Request received</h3>
  <p>A manager will email you within one business day.</p>
</div>
