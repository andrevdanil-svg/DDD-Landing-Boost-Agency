<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="glow" cx="75%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#655BFA" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#655BFA" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#655BFA" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a10"/>
      <stop offset="100%" stop-color="#14141e"/>
    </linearGradient>
    <pattern id="dots" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#24242c"/>
    </pattern>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#655BFA"/>
      <stop offset="100%" stop-color="#ff8a5b"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Brand mark -->
  <g transform="translate(80, 72)">
    <circle cx="22" cy="22" r="22" fill="#655BFA"/>
    <path d="M14 14 L30 14 L30 22 L18 22 L18 26 L30 26 L30 34 L14 34 Z" fill="#fff"/>
    <text x="64" y="31" font-family="'Space Grotesk', sans-serif" font-weight="600" font-size="28" fill="#f5f5f7">Boost! Agency</text>
  </g>

  <!-- Headline -->
  <g transform="translate(80, 240)">
    <text font-family="'Space Grotesk', sans-serif" font-weight="500" font-size="78" fill="#f5f5f7">
      <tspan x="0" y="0">Programmatic-реклама</tspan>
      <tspan x="0" y="92">без <tspan fill="#8b7fff" font-style="italic">чёрного ящика.</tspan></tspan>
    </text>
  </g>

  <!-- Subtitle -->
  <g transform="translate(80, 470)">
    <text font-family="Inter, sans-serif" font-weight="400" font-size="24" fill="#c9c9d1">
      <tspan x="0" y="0">Display · Video · Native · CTV · Mobile in-app</tspan>
      <tspan x="0" y="36">Прозрачная аналитика на уровне аукциона.</tspan>
    </text>
  </g>

  <!-- Accent underline -->
  <rect x="80" y="560" width="160" height="4" rx="2" fill="url(#accentLine)"/>

  <!-- Right-side KPI cards -->
  <g transform="translate(860, 230)">
    <rect width="260" height="96" rx="16" fill="rgba(23,23,32,0.9)" stroke="#32323c"/>
    <text x="20" y="34" font-family="Inter, sans-serif" font-size="13" fill="#8a8a95" letter-spacing="1.5" font-weight="500">ROAS</text>
    <text x="20" y="70" font-family="'Space Grotesk', sans-serif" font-weight="500" font-size="34" fill="#f5f5f7">×3.14</text>
    <text x="160" y="70" font-family="Inter, sans-serif" font-size="16" fill="#3ecf8e" font-weight="500">↑ +0.82</text>
  </g>

  <g transform="translate(860, 346)">
    <rect width="260" height="96" rx="16" fill="rgba(23,23,32,0.9)" stroke="#32323c"/>
    <text x="20" y="34" font-family="Inter, sans-serif" font-size="13" fill="#8a8a95" letter-spacing="1.5" font-weight="500">CPA</text>
    <text x="20" y="70" font-family="'Space Grotesk', sans-serif" font-weight="500" font-size="34" fill="#f5f5f7">$4.20</text>
    <text x="160" y="70" font-family="Inter, sans-serif" font-size="16" fill="#3ecf8e" font-weight="500">↓ −41%</text>
  </g>

  <!-- Domain -->
  <text x="1120" y="595" text-anchor="end" font-family="Inter, sans-serif" font-size="18" fill="#8a8a95" font-weight="500">boostagency.uz</text>
</svg>
