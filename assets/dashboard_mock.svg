<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" fill="none" font-family="Inter, -apple-system, system-ui, sans-serif">
  <defs>
    <linearGradient id="chartFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#655BFA" stop-opacity=".45"/>
      <stop offset="1" stop-color="#655BFA" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sparkFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#655BFA" stop-opacity=".4"/>
      <stop offset="1" stop-color="#655BFA" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="760" rx="16" fill="#0f0f12"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="72" height="760" fill="#0a0a0c"/>
  <!-- logo mark -->
  <rect x="22" y="22" width="28" height="28" rx="6" fill="#655BFA"/>
  <!-- sidebar icons -->
  <g fill="none" stroke="#8a8a95" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="26" y="110" width="20" height="20" rx="3" stroke="#655BFA"/>
    <circle cx="36" cy="170" r="8"/>
    <path d="M28 220h16M28 228h10"/>
    <path d="M28 278l6-6 4 4 8-10"/>
    <path d="M30 330h12M30 336h8"/>
  </g>

  <!-- Topbar -->
  <rect x="72" y="0" width="1128" height="64" fill="#0f0f12"/>
  <line x1="72" y1="64" x2="1200" y2="64" stroke="#1a1a20"/>
  <!-- breadcrumbs -->
  <text x="96" y="38" font-size="13" fill="#8a8a95">Рекламодатель</text>
  <text x="222" y="38" font-size="13" fill="#55555f">/</text>
  <text x="236" y="38" font-size="13" fill="#f5f5f7" font-weight="500">Dashboard</text>
  <!-- date picker -->
  <rect x="900" y="20" width="170" height="28" rx="6" fill="#17171c" stroke="#24242c"/>
  <text x="914" y="38" font-size="12" fill="#c9c9d1">01 янв – 15 янв 2026</text>
  <!-- export -->
  <rect x="1080" y="20" width="96" height="28" rx="6" fill="#655BFA"/>
  <text x="1128" y="38" font-size="12" fill="#ffffff" font-weight="600" text-anchor="middle">Экспорт</text>

  <!-- Content area -->
  <!-- Page title -->
  <text x="104" y="120" font-size="26" fill="#f5f5f7" font-weight="500" font-family="'Space Grotesk', Inter, sans-serif">Кампании</text>
  <text x="104" y="146" font-size="13" fill="#8a8a95">Сводка по всем активным кампаниям за выбранный период</text>

  <!-- HERO KPI (big) -->
  <g>
    <rect x="104" y="176" width="516" height="240" rx="14" fill="#17171c" stroke="#24242c"/>
    <!-- eyebrow -->
    <text x="128" y="208" font-size="11" fill="#8a8a95" letter-spacing="1.5">ВСЕГО ПОКАЗОВ</text>
    <!-- value -->
    <text x="128" y="276" font-size="56" fill="#f5f5f7" font-family="'Space Grotesk', Inter, sans-serif">4&#8239;582&#8239;194</text>
    <!-- delta pill -->
    <rect x="128" y="292" width="86" height="22" rx="11" fill="rgba(101,91,250,.12)"/>
    <text x="142" y="307" font-size="11" fill="#8b7fff" font-weight="600">↑ +18.4%</text>
    <!-- mini description -->
    <text x="128" y="338" font-size="12" fill="#8a8a95">за период vs предыдущий</text>
    <!-- sparkline area -->
    <path d="M128 390 L 168 370 L 208 378 L 248 352 L 288 362 L 328 338 L 368 344 L 408 310 L 448 322 L 488 296 L 528 308 L 568 280 L 600 292 L 600 400 L 128 400 Z" fill="url(#sparkFill)"/>
    <path d="M128 390 L 168 370 L 208 378 L 248 352 L 288 362 L 328 338 L 368 344 L 408 310 L 448 322 L 488 296 L 528 308 L 568 280 L 600 292" stroke="#655BFA" stroke-width="2" fill="none"/>
  </g>

  <!-- Small KPI cards -->
  <g>
    <rect x="640" y="176" width="250" height="112" rx="14" fill="#17171c" stroke="#24242c"/>
    <text x="660" y="204" font-size="10" fill="#8a8a95" letter-spacing="1.5">CLICKS</text>
    <text x="660" y="244" font-size="28" fill="#f5f5f7" font-weight="500">58&#8239;412</text>
    <text x="660" y="268" font-size="11" fill="#8b7fff">↑ +12.3%</text>
    <!-- mini spark -->
    <polyline points="780,260 798,252 816,256 834,244 852,250 870,230" stroke="#655BFA" stroke-width="1.8" fill="none"/>
  </g>
  <g>
    <rect x="910" y="176" width="250" height="112" rx="14" fill="#17171c" stroke="#24242c"/>
    <text x="930" y="204" font-size="10" fill="#8a8a95" letter-spacing="1.5">CTR</text>
    <text x="930" y="244" font-size="28" fill="#f5f5f7" font-weight="500">1.27%</text>
    <text x="930" y="268" font-size="11" fill="#8b7fff">↑ +0.31%</text>
    <polyline points="1050,258 1066,248 1082,254 1098,240 1114,246 1130,232" stroke="#655BFA" stroke-width="1.8" fill="none"/>
  </g>
  <g>
    <rect x="640" y="304" width="250" height="112" rx="14" fill="#17171c" stroke="#24242c"/>
    <text x="660" y="332" font-size="10" fill="#8a8a95" letter-spacing="1.5">CPA</text>
    <text x="660" y="372" font-size="28" fill="#f5f5f7" font-weight="500">$4.20</text>
    <text x="660" y="396" font-size="11" fill="#8b7fff">↓ −41%</text>
    <polyline points="780,388 798,384 816,378 834,372 852,368 870,358" stroke="#655BFA" stroke-width="1.8" fill="none"/>
  </g>
  <g>
    <rect x="910" y="304" width="250" height="112" rx="14" fill="#17171c" stroke="#24242c"/>
    <text x="930" y="332" font-size="10" fill="#8a8a95" letter-spacing="1.5">ROAS</text>
    <text x="930" y="372" font-size="28" fill="#f5f5f7" font-weight="500">×3.14</text>
    <text x="930" y="396" font-size="11" fill="#8b7fff">↑ +0.82</text>
    <polyline points="1050,388 1066,380 1082,382 1098,370 1114,372 1130,358" stroke="#655BFA" stroke-width="1.8" fill="none"/>
  </g>

  <!-- Main chart -->
  <g>
    <rect x="104" y="440" width="1056" height="280" rx="14" fill="#17171c" stroke="#24242c"/>
    <text x="128" y="472" font-size="14" fill="#f5f5f7" font-weight="500">Динамика по дням</text>
    <!-- tab chips -->
    <rect x="980" y="458" width="70" height="24" rx="12" fill="#655BFA"/>
    <text x="1015" y="474" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="600">Показы</text>
    <rect x="1058" y="458" width="62" height="24" rx="12" fill="transparent" stroke="#32323c"/>
    <text x="1089" y="474" font-size="11" fill="#8a8a95" text-anchor="middle">Клики</text>
    <!-- grid -->
    <g stroke="#1a1a20">
      <line x1="128" y1="560" x2="1136" y2="560"/>
      <line x1="128" y1="620" x2="1136" y2="620"/>
      <line x1="128" y1="680" x2="1136" y2="680"/>
    </g>
    <!-- area fill -->
    <path d="M128 660 L 210 620 L 292 640 L 374 590 L 456 610 L 538 560 L 620 580 L 702 520 L 784 540 L 866 500 L 948 530 L 1030 480 L 1136 500 L 1136 690 L 128 690 Z" fill="url(#chartFill)"/>
    <path d="M128 660 L 210 620 L 292 640 L 374 590 L 456 610 L 538 560 L 620 580 L 702 520 L 784 540 L 866 500 L 948 530 L 1030 480 L 1136 500" stroke="#655BFA" stroke-width="2.4" fill="none"/>
    <!-- hover point -->
    <circle cx="866" cy="500" r="5" fill="#655BFA" stroke="#0f0f12" stroke-width="2.5"/>
    <!-- x-axis labels -->
    <g font-size="10" fill="#55555f">
      <text x="128" y="710">01 янв</text>
      <text x="310" y="710">05 янв</text>
      <text x="492" y="710">09 янв</text>
      <text x="674" y="710">12 янв</text>
      <text x="856" y="710">14 янв</text>
      <text x="1080" y="710">15 янв</text>
    </g>
  </g>
</svg>
