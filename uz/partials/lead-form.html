<form class="form" id="contact-form" action="https://platform.boostagency.uz/api/leads" method="post" novalidate>
  <div class="form__row">
    <div class="form__field">
      <label for="f-first">Ism</label>
      <input id="f-first" name="first_name" type="text" placeholder="Ism" required>
    </div>
    <div class="form__field">
      <label for="f-last">Familiya</label>
      <input id="f-last" name="last_name" type="text" placeholder="Familiya" required>
    </div>
  </div>
  <div class="form__field">
    <label for="f-email">Ish emaili</label>
    <input id="f-email" name="email" type="email" placeholder="client@company.com" required>
  </div>
  <div class="form__row">
    <div class="form__field">
      <label for="f-company">Kompaniya</label>
      <input id="f-company" name="company" type="text" placeholder="Kompaniya nomi" required>
    </div>
    <div class="form__field">
      <label for="f-role">Lavozim</label>
      <input id="f-role" name="role" type="text" placeholder="Head of Marketing">
    </div>
  </div>
  <div class="form__row">
    <div class="form__field">
      <label for="f-phone">Telefon</label>
      <input id="f-phone" name="phone" type="tel" placeholder="+998 90 123 45 67" pattern="[\+\d\s\-\(\)]{7,20}" title="Mamlakat kodi bilan raqam — masalan, +998 90 123 45 67">
    </div>
    <div class="form__field">
      <label for="f-site">Veb-sayt</label>
      <input id="f-site" name="website" type="url" placeholder="https://company.com">
    </div>
  </div>
  <div class="form__field">
    <label for="f-budget">Oylik byudjet</label>
    <select id="f-budget" name="budget" required>
      <option value="" disabled selected hidden>Oraliqni tanlang</option>
      <option>$5 000 gacha</option>
      <option>$5 000 – $20 000</option>
      <option>$20 000 – $50 000</option>
      <option>$50 000 dan</option>
      <option>Hali bilmayman</option>
    </select>
  </div>
  <div class="form__field">
    <label for="f-msg">Nimani muhokama qilmoqchisiz?</label>
    <textarea id="f-msg" name="message" rows="4" placeholder="Mahsulot, KPIlar va joriy vaziyat haqida qisqacha"></textarea>
  </div>
  <div class="form__honeypot" aria-hidden="true">
    <label for="f-hp-url">Bu maydonni to'ldirmang</label>
    <input id="f-hp-url" name="website_url" type="text" tabindex="-1" autocomplete="off">
  </div>
  <label class="form__checkbox">
    <input type="checkbox" name="consent" required>
    <span>Shaxsiy ma'lumotlarni qayta ishlashga <a href="privacy/">Maxfiylik siyosati</a>ga muvofiq roziman.</span>
  </label>
  <div class="form__error" id="form-error" role="alert" aria-live="polite" hidden>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span class="form__error-text">Arizani yuborib bo'lmadi. Qayta urinib ko'ring yoki bizga yozing: <a href="mailto:hello@boost.agency">hello@boost.agency</a>.</span>
  </div>
  <button type="submit" class="btn btn--primary btn--large form__submit">Arizani yuborish</button>
</form>

<div class="form__success" id="form-success" role="status" aria-live="polite">
  <div class="form__success-icon">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <h3>Ariza qabul qilindi</h3>
  <p>Menejer sizga ko'rsatilgan emailga ish kuni davomida yozadi.</p>
</div>
